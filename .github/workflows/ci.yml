name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: License and advisory check
        run: cargo deny check

      - name: Tests
        run: cargo nextest run

  mutants:
    name: Mutation Testing
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true  # informational only, never fails the build
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # needed for diff

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Run mutation testing
        run: cargo mutants --no-shuffle -j 2 -- --all-targets
